<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ATA Quick Guide — ata-quick-guide.bartwo.me">
  <meta name="theme-color" content="#000000">
  <title>ATA Quick Guide</title>
  <link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg==" id="favicon-dynamic">
  <link rel="canonical" href="https://ata-quick-guide.bartwo.me/">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://ata-quick-guide.bartwo.me/">
  <meta property="og:title" content="ATA Quick Guide">
  <meta property="og:description" content="ATA Quick Guide — ata-quick-guide.bartwo.me">
  <meta property="og:image" content="https://ata-quick-guide.bartwo.me/og-image.png?v=2">
  <meta property="og:image:alt" content="ATA Quick Guide — krom logo">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="ATA Quick Guide">
  <meta name="twitter:description" content="ATA Quick Guide — ata-quick-guide.bartwo.me">
  <meta name="twitter:image" content="https://ata-quick-guide.bartwo.me/og-image.png?v=2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/bartwo.css">
  <script src="js/tab-flair.js" defer></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div class="bg" aria-hidden="true">
    <canvas id="stars"></canvas>
    <div class="bg-fog"></div>
    <div class="bg-vignette"></div>
  </div>

  <main class="stage">
    <div class="hero-3d">
      <div class="logo-neon-bloom" aria-hidden="true"></div>
      <div class="hero-depth-glow" aria-hidden="true"></div>
      <div
        id="load-veil"
        class="load-veil"
        aria-hidden="true"
        aria-busy="true"
        aria-label="Yükleniyor"
      >
        <div class="load-veil__spin">
          <svg class="load-veil__sigil" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
            <path fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="miter"
              d="M50 6 L76 86 L8 36 L92 36 L24 86 Z"/>
          </svg>
        </div>
      </div>
      <div id="three-root" class="three-root" role="img" aria-label="ATA Quick Guide 3D logo"></div>
      <h1 class="sr-only">ATA Quick Guide</h1>
    </div>
  </main>

  <div class="crt-shim" aria-hidden="true"></div>

  <div class="vhs" aria-hidden="true">
    <canvas id="vhs-noise" class="vhs-noise-canvas"></canvas>
    <div class="vhs-scanlines"></div>
    <div class="vhs-flicker"></div>
  </div>

  <div id="easter-toast" class="easter-toast" role="status" aria-live="polite"></div>

  <footer class="site-footer">
    <p class="footer-line">
      <svg class="pentagram" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
        <path fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="miter"
          d="M50 6 L76 86 L8 36 L92 36 L24 86 Z"/>
      </svg>
      <span class="footer-text">© <span id="year"></span> ATA Quick Guide. All rights reserved.</span>
      <button type="button" class="ambient-toggle" id="ambient-toggle" aria-label="Şerit gürültüsü aç veya kapat" aria-pressed="false" title="Tape hiss">⟡</button>
      <svg class="pentagram" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
        <path fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="miter"
          d="M50 6 L76 86 L8 36 L92 36 L24 86 Z"/>
      </svg>
    </p>
  </footer>

  <script src="js/stars.js"></script>
  <script src="js/vhs.js"></script>
  <script src="js/extras.js"></script>
  <script type="module" src="js/model.js"></script>
  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
