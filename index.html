<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="bartwo — bartwo.me">
  <meta name="theme-color" content="#000000">
  <title>bartwo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/bartwo.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div class="bg" aria-hidden="true">
    <canvas id="stars"></canvas>
    <div class="bg-fog"></div>
    <div class="bg-vignette"></div>
  </div>

  <main class="stage">
    <div class="hero-3d">
      <div class="logo-neon-bloom" aria-hidden="true"></div>
      <div id="three-root" class="three-root" role="img" aria-label="bartwo 3D logo"></div>
      <h1 class="sr-only">bartwo</h1>
    </div>
  </main>

  <div class="vhs" aria-hidden="true">
    <canvas id="vhs-noise" class="vhs-noise-canvas"></canvas>
    <div class="vhs-roll"></div>
    <div class="vhs-scanlines"></div>
    <div class="vhs-flicker"></div>
  </div>

  <footer class="site-footer">
    <p class="footer-line">
      <svg class="pentagram" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
        <path fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="miter"
          d="M50 6 L76 86 L8 36 L92 36 L24 86 Z"/>
      </svg>
      <span class="footer-text">© <span id="year"></span> bartwo. All rights reserved.</span>
      <svg class="pentagram" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
        <path fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="miter"
          d="M50 6 L76 86 L8 36 L92 36 L24 86 Z"/>
      </svg>
    </p>
  </footer>

  <script src="js/stars.js"></script>
  <script src="js/vhs.js"></script>
  <script type="module" src="js/model.js"></script>
  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
